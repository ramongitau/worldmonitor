syntax = "proto3";

package worldmonitor.intelligence.v1;

import "sebuf/http/annotations.proto";

message GetCiiHistoryRequest {
  string region = 1;
  int32 days = 2; // Number of days of history to fetch (default 7)
}

message CiiHistoryPoint {
  int64 ts = 1;
  double score = 2;
}

message GetCiiHistoryResponse {
  string region = 1;
  repeated CiiHistoryPoint points = 2;
}
